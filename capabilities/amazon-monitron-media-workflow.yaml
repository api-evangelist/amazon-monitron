naftiko: 1.0.0-alpha2
info:
  label: Amazon Monitron Workflow
  description: Workflow capability for Amazon Monitron media processing operations for broadcast engineers and media developers.
  tags:
  - AWS
  - Media
  - Broadcasting
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: monitron
    baseUri: https://monitron.us-east-1.amazonaws.com
    description: Amazon Monitron REST API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: default
      path: /
      description: Amazon Monitron resources
      operations:
      - name: list-projects
        method: GET
        description: Amazon Monitron List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          type: string
          required: false
          description: A pagination token.
      - name: create-project
        method: POST
        description: Amazon Monitron Create Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: get-project
        method: GET
        description: Amazon Monitron Get Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
      - name: update-project
        method: PATCH
        description: Amazon Monitron Update Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
        body:
          type: json
          data: {}
      - name: delete-project
        method: DELETE
        description: Amazon Monitron Delete Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
      - name: list-project-admin-users
        method: GET
        description: Amazon Monitron List Project Admin Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: Max results.
        - name: nextToken
          in: query
          type: string
          required: false
          description: Pagination token.
      - name: associate-project-admin-user
        method: POST
        description: Amazon Monitron Associate Project Admin User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
        body:
          type: json
          data: {}
      - name: get-project-admin-user
        method: GET
        description: Amazon Monitron Get Project Admin User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
        - name: userArn
          in: path
          type: string
          required: true
          description: The ARN of the user.
      - name: disassociate-project-admin-user
        method: DELETE
        description: Amazon Monitron Disassociate Project Admin User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: path
          type: string
          required: true
          description: The name of the project.
        - name: userArn
          in: path
          type: string
          required: true
          description: The ARN of the user.
      - name: list-tags-for-resource
        method: GET
        description: Amazon Monitron List Tags for Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          required: true
          description: The ARN of the resource.
      - name: tag-resource
        method: POST
        description: Amazon Monitron Tag Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          required: true
          description: The ARN of the resource.
        body:
          type: json
          data: {}
      - name: untag-resource
        method: DELETE
        description: Amazon Monitron Untag Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          required: true
          description: The ARN of the resource.
        - name: tagKeys
          in: query
          type: array
          required: true
          description: Tag keys to remove.
  exposes:
  - type: rest
    port: 8080
    namespace: monitron-workflow-api
    description: Unified REST API for Amazon Monitron workflow management.
    resources:
    - path: /v1/jobs
      name: jobs
      description: Manage media processing jobs
      operations:
      - method: GET
        name: list-jobs
        description: List jobs
        call: monitron.list-jobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: monitron-workflow-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Monitron workflow management.
    tools:
    - name: list-projects
      description: Amazon Monitron List Projects
      hints:
        readOnly: true
        openWorld: true
      call: monitron.list-projects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Amazon Monitron Create Project
      hints:
        readOnly: false
        openWorld: true
      call: monitron.create-project
      outputParameters:
      - type: object
        mapping: $.
    - name: get-project
      description: Amazon Monitron Get Project
      hints:
        readOnly: true
        openWorld: true
      call: monitron.get-project
      outputParameters:
      - type: object
        mapping: $.
    - name: update-project
      description: Amazon Monitron Update Project
      hints:
        readOnly: false
        openWorld: true
      call: monitron.update-project
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-project
      description: Amazon Monitron Delete Project
      hints:
        readOnly: false
        openWorld: true
      call: monitron.delete-project
      outputParameters:
      - type: object
        mapping: $.
    - name: list-project-admin-users
      description: Amazon Monitron List Project Admin Users
      hints:
        readOnly: true
        openWorld: true
      call: monitron.list-project-admin-users
      outputParameters:
      - type: object
        mapping: $.
    - name: associate-project-admin-user
      description: Amazon Monitron Associate Project Admin User
      hints:
        readOnly: false
        openWorld: true
      call: monitron.associate-project-admin-user
      outputParameters:
      - type: object
        mapping: $.
    - name: get-project-admin-user
      description: Amazon Monitron Get Project Admin User
      hints:
        readOnly: true
        openWorld: true
      call: monitron.get-project-admin-user
      outputParameters:
      - type: object
        mapping: $.
