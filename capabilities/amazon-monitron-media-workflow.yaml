naftiko: 1.0.0-alpha1
info:
  label: Amazon Monitron Workflow
  description: Workflow capability for Amazon Monitron media processing operations for broadcast engineers and media developers.
  tags:
  - AWS
  - Media
  - Broadcasting
  - Workflow
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: monitron
    location: ./shared/monitron.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: monitron-workflow-api
    description: Unified REST API for Amazon Monitron workflow management.
    resources:
    - path: /v1/jobs
      name: jobs
      description: Manage media processing jobs
      operations:
      - method: GET
        name: list-jobs
        description: List jobs
        call: monitron.list-jobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: monitron-workflow-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Monitron workflow management.
    tools:
    - name: list-projects
      description: Amazon Monitron List Projects
      hints:
        readOnly: true
        openWorld: true
      call: monitron.list-projects
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Amazon Monitron Create Project
      hints:
        readOnly: false
        openWorld: true
      call: monitron.create-project
      outputParameters:
      - type: object
        mapping: $.
    - name: get-project
      description: Amazon Monitron Get Project
      hints:
        readOnly: true
        openWorld: true
      call: monitron.get-project
      outputParameters:
      - type: object
        mapping: $.
    - name: update-project
      description: Amazon Monitron Update Project
      hints:
        readOnly: false
        openWorld: true
      call: monitron.update-project
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-project
      description: Amazon Monitron Delete Project
      hints:
        readOnly: false
        openWorld: true
      call: monitron.delete-project
      outputParameters:
      - type: object
        mapping: $.
    - name: list-project-admin-users
      description: Amazon Monitron List Project Admin Users
      hints:
        readOnly: true
        openWorld: true
      call: monitron.list-project-admin-users
      outputParameters:
      - type: object
        mapping: $.
    - name: associate-project-admin-user
      description: Amazon Monitron Associate Project Admin User
      hints:
        readOnly: false
        openWorld: true
      call: monitron.associate-project-admin-user
      outputParameters:
      - type: object
        mapping: $.
    - name: get-project-admin-user
      description: Amazon Monitron Get Project Admin User
      hints:
        readOnly: true
        openWorld: true
      call: monitron.get-project-admin-user
      outputParameters:
      - type: object
        mapping: $.
